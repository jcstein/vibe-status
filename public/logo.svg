<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40" fill="none">
  <!-- Icon mark -->
  <rect width="32" height="32" rx="7" y="4" fill="currentColor" opacity="0.1"/>
  <text x="5" y="27" font-family="monospace" font-weight="700" font-size="20" fill="currentColor">V</text>
  <circle cx="24" cy="12" r="3.5" fill="#34d399"/>
  <circle cx="24" cy="12" r="3.5" fill="#34d399" opacity="0.4">
    <animate attributeName="r" values="3.5;6;3.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Wordmark -->
  <text x="42" y="27" font-family="monospace" font-weight="700" font-size="18" fill="currentColor">vibe</text>
  <text x="103" y="27" font-family="monospace" font-weight="700" font-size="18" fill="currentColor" opacity="0.35">/</text>
  <text x="114" y="27" font-family="monospace" font-weight="700" font-size="18" fill="currentColor">status</text>
</svg>
